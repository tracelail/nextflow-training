# nf-core/demo v1.1.0 — Parameter skeleton
# Generated by: nf-core pipelines create-params-file nf-core/demo -r 1.1.0
#
# This file shows all configurable parameters for nf-core/demo with their
# defaults and descriptions. Uncomment and modify the values you want to change,
# then run with:
#
#   nextflow run nf-core/demo -r 1.1.0 -profile docker -params-file demo_params_skeleton.yml
#
# Parameters prefixed with # are at their default values — no need to set them
# unless you want to change them.

# ── Input/Output ───────────────────────────────────────────────────────────
input: sample_data/samplesheet.csv        # Path to CSV samplesheet
outdir: results                            # Directory for output files

# ── Reference genome ──────────────────────────────────────────────────────
# (nf-core/demo does not require a reference genome — fields below are examples
# of what you would see in a more complex pipeline like nf-core/rnaseq)
# genome: null
# fasta: null
# gtf: null

# ── Resource limits ────────────────────────────────────────────────────────
# Uncomment to restrict resources (useful on laptops):
# max_cpus: 4
# max_memory: 8.GB
# max_time: 1.h

# ── Email and notifications ────────────────────────────────────────────────
# email: your@email.com     # Send completion notification
# email_on_fail: null       # Only email on failure

# ── MultiQC ────────────────────────────────────────────────────────────────
# multiqc_title: null       # Custom title for the MultiQC report
# multiqc_config: null      # Path to custom MultiQC YAML config
# multiqc_logo: null        # Path to a logo image for the report

# ── Generic nf-core options ────────────────────────────────────────────────
# publish_dir_mode: copy    # How to publish outputs: copy, symlink, link, move
# validate_params: true     # Validate params against schema before running
# monochrome_logs: false    # Turn off coloured log output
# hook_url: null            # Slack/Teams webhook URL for notifications
