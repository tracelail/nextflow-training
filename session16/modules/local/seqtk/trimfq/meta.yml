input:
  # TODO 4: Document the input tuple channel.
  # Use the same structure as in seqtk/seq/meta.yml.
  # The reads file should have EDAM ontology entries for:
  #   data:  http://edamontology.org/data_2044   (Sequence reads)
  #   format: http://edamontology.org/format_1930 (FASTQ)
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information.
          e.g. [ id:'sample1', single_end:true ]
    - reads:
        type: file
        description: "TODO: describe the input reads"
        pattern: "TODO"
        ontologies:
          - edam: "TODO"
          - edam: "TODO"

output:
  # TODO 5: Document the trimmed output channel.
  # Output is gzip-compressed FASTQ.  Use EDAM format_1930.
  - trimmed:
      - - meta:
              type: map
              description: Groovy Map containing sample information, passed through unchanged.
        - "*.fastq.gz":
              type: file
              description: "TODO: describe the trimmed output"
              pattern: "*.fastq.gz"
              ontologies:
                - edam: "TODO"

  # TODO 6: Document the topic channel version output.
  # Copy the versions_seqtk block from seqtk/seq/meta.yml and adjust as needed.
  - versions_seqtk:
      - - "${task.process}":
              type: string
              description: The fully-qualified Nextflow process name
        - seqtk:
              type: string
              description: The tool name
        - "TODO: version capture command":
              type: string
              description: The shell command used to capture the version string

